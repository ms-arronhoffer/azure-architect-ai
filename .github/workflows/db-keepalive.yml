name: db-keepalive

on:
  schedule:
    # Run every day at 06:00 UTC — starts the DB if it was stopped overnight
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  start-db:
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        rg: [aarch-dev-rg, aarch-test-rg]
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start PostgreSQL if stopped
        run: |
          # Discover the PG server name in this RG (only one per env). Skip the
          # job cleanly when the RG doesn't exist yet (e.g. test env not deployed).
          if ! az group show -n ${{ matrix.rg }} >/dev/null 2>&1; then
            echo "Resource group ${{ matrix.rg }} does not exist — skipping."
            exit 0
          fi
          PG=$(az postgres flexible-server list -g ${{ matrix.rg }} --query "[0].name" -o tsv | tr -d '\r\n')
          if [ -z "$PG" ]; then
            echo "No PostgreSQL flexible server found in ${{ matrix.rg }} — skipping."
            exit 0
          fi
          STATE=$(az postgres flexible-server show \
            --name "$PG" \
            --resource-group ${{ matrix.rg }} \
            --query state -o tsv)
          echo "${{ matrix.rg }}/$PG state: $STATE"
          if [ "$STATE" = "Stopped" ]; then
            echo "Server is stopped — starting..."
            az postgres flexible-server start \
              --name "$PG" \
              --resource-group ${{ matrix.rg }}
            echo "Start command issued."
          else
            echo "Server is already $STATE — nothing to do."
          fi
