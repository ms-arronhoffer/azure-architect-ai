name: deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to deploy: backend,frontend"
        required: false
        default: "backend,frontend"
      deploy_infra:
        description: "Run subscription-scoped Bicep deploy first (creates/updates RG and platform resources)"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: centralus
  DEPLOYMENT_NAME: main
  IMAGE_TAG: ${{ github.sha }}

jobs:
  infra:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_infra == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy subscription template
        env:
          PG_ADMIN_PASSWORD: ${{ secrets.PG_ADMIN_PASSWORD }}
          SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY }}
          ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          ENTRA_AUDIENCE: ${{ vars.ENTRA_AUDIENCE }}
          ONCALL_EMAIL: ${{ vars.ONCALL_EMAIL }}
        run: |
          az deployment sub create \
            -n ${{ env.DEPLOYMENT_NAME }} \
            -l ${{ env.AZURE_LOCATION }} \
            -f infra/main.bicep \
            -p infra/main.bicepparam

  detect:
    needs: [infra]
    if: always() && (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      acr: ${{ steps.outputs.outputs.acr }}
      rg: ${{ steps.outputs.outputs.rg }}
      backendApp: ${{ steps.outputs.outputs.backendApp }}
      frontendApp: ${{ steps.outputs.outputs.frontendApp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - id: outputs
        run: |
          ACR_LOGIN=$(az deployment sub show -n ${{ env.DEPLOYMENT_NAME }} --query properties.outputs.acrLoginServer.value -o tsv)
          RG=$(az deployment sub show -n ${{ env.DEPLOYMENT_NAME }} --query properties.outputs.resourceGroupName.value -o tsv)
          echo "acr=${ACR_LOGIN%%.*}" >> $GITHUB_OUTPUT
          echo "rg=$RG" >> $GITHUB_OUTPUT
          echo "backendApp=$(az containerapp list -g $RG --query "[?contains(name, 'backend')].name | [0]" -o tsv)" >> $GITHUB_OUTPUT
          echo "frontendApp=$(az containerapp list -g $RG --query "[?contains(name, 'frontend')].name | [0]" -o tsv)" >> $GITHUB_OUTPUT

  backend:
    needs: [detect, infra]
    if: |
      always() &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      (needs.detect.outputs.backend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR build
        run: |
          az acr build -r ${{ needs.detect.outputs.acr }} \
            -t aa-backend:${{ env.IMAGE_TAG }} \
            -t aa-backend:latest \
            -f backend/Dockerfile.prod ./backend
      - name: Update container app revision
        run: |
          az containerapp update \
            -g ${{ needs.detect.outputs.rg }} \
            -n ${{ needs.detect.outputs.backendApp }} \
            --image ${{ needs.detect.outputs.acr }}.azurecr.io/aa-backend:${{ env.IMAGE_TAG }} \
            --revision-suffix sha-${{ env.IMAGE_TAG }}

  frontend:
    needs: [detect, infra]
    if: |
      always() &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      (needs.detect.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR build
        run: |
          az acr build -r ${{ needs.detect.outputs.acr }} \
            -t aa-frontend:${{ env.IMAGE_TAG }} \
            -t aa-frontend:latest \
            -f frontend/Dockerfile.prod \
            --build-arg VITE_API_BASE_URL="" \
            --build-arg VITE_AUTH_ENABLED=true \
            --build-arg VITE_ENTRA_TENANT_ID=${{ vars.VITE_ENTRA_TENANT_ID }} \
            --build-arg VITE_ENTRA_CLIENT_ID=${{ vars.VITE_ENTRA_CLIENT_ID }} \
            --build-arg VITE_ENTRA_API_SCOPE=${{ vars.VITE_ENTRA_API_SCOPE }} \
            ./frontend
      - name: Update container app revision
        run: |
          az containerapp update \
            -g ${{ needs.detect.outputs.rg }} \
            -n ${{ needs.detect.outputs.frontendApp }} \
            --image ${{ needs.detect.outputs.acr }}.azurecr.io/aa-frontend:${{ env.IMAGE_TAG }} \
            --revision-suffix sha-${{ env.IMAGE_TAG }}

  smoke:
    needs: [detect, backend, frontend]
    if: always() && (needs.backend.result == 'success' || needs.frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Frontend health check
        run: |
          URL=$(az deployment sub show -n ${{ env.DEPLOYMENT_NAME }} --query properties.outputs.frontendUrl.value -o tsv)
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          exit 1
