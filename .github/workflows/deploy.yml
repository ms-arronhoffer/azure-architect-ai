name: deploy

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to deploy: backend,frontend"
        required: false
        default: "backend,frontend"
      deploy_infra:
        description: "Run subscription-scoped Bicep deploy first (creates/updates RG and platform resources)"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: centralus
  IMAGE_TAG: ${{ github.sha }}

jobs:
  setenv:
    runs-on: ${{ github.ref == 'refs/heads/dev' && 'ubuntu-server-2' || 'ubuntu-latest' }}
    outputs:
      target_env: ${{ steps.pick.outputs.target_env }}
      gh_env: ${{ steps.pick.outputs.gh_env }}
      gh_env_apply: ${{ steps.pick.outputs.gh_env_apply }}
      rg_fallback: ${{ steps.pick.outputs.rg_fallback }}
      param_file: ${{ steps.pick.outputs.param_file }}
      deployment_name: ${{ steps.pick.outputs.deployment_name }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "target_env=test" >> $GITHUB_OUTPUT
            echo "gh_env=test" >> $GITHUB_OUTPUT
            echo "gh_env_apply=test-apply" >> $GITHUB_OUTPUT
            echo "rg_fallback=aarch-test-rg" >> $GITHUB_OUTPUT
            echo "param_file=infra/main.test.bicepparam" >> $GITHUB_OUTPUT
            echo "deployment_name=aarch-test" >> $GITHUB_OUTPUT
          else
            echo "target_env=dev" >> $GITHUB_OUTPUT
            echo "gh_env=dev" >> $GITHUB_OUTPUT
            echo "gh_env_apply=dev-apply" >> $GITHUB_OUTPUT
            echo "rg_fallback=aarch-dev-rg" >> $GITHUB_OUTPUT
            echo "param_file=infra/main.bicepparam" >> $GITHUB_OUTPUT
            echo "deployment_name=aarch-dev" >> $GITHUB_OUTPUT
          fi

  infra:
    needs: [setenv]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_infra == 'true'
    runs-on: ${{ github.ref == 'refs/heads/dev' && 'ubuntu-server-2' || 'ubuntu-latest' }}
    environment: ${{ needs.setenv.outputs.gh_env }}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy subscription template
        env:
          PG_ADMIN_PASSWORD: ${{ secrets.PG_ADMIN_PASSWORD }}
          SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY }}
          ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          ENTRA_AUDIENCE: ${{ vars.ENTRA_AUDIENCE }}
          ONCALL_EMAIL: ${{ vars.ONCALL_EMAIL }}
        run: |
          az deployment sub create \
            -n ${{ needs.setenv.outputs.deployment_name }} \
            -l ${{ env.AZURE_LOCATION }} \
            -f infra/main.bicep \
            -p ${{ needs.setenv.outputs.param_file }}

  detect:
    needs: [setenv, infra]
    if: always() && (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ${{ github.ref == 'refs/heads/dev' && 'ubuntu-server-2' || 'ubuntu-latest' }}
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      acr: ${{ steps.outputs.outputs.acr }}
      rg: ${{ steps.outputs.outputs.rg }}
      backendApp: ${{ steps.outputs.outputs.backendApp }}
      frontendApp: ${{ steps.outputs.outputs.frontendApp }}
      frontendUrl: ${{ steps.outputs.outputs.frontendUrl }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - id: outputs
        run: |
          # Try deployment outputs first; fall back to direct lookup so a
          # transiently-failed sub-deployment doesn't block app rollouts.
          ACR_LOGIN=$(az deployment sub show -n ${{ needs.setenv.outputs.deployment_name }} --query properties.outputs.acrLoginServer.value -o tsv 2>/dev/null | tr -d '\r\n' || true)
          RG=$(az deployment sub show -n ${{ needs.setenv.outputs.deployment_name }} --query properties.outputs.resourceGroupName.value -o tsv 2>/dev/null | tr -d '\r\n' || true)
          if [ -z "$RG" ]; then
            RG="${{ needs.setenv.outputs.rg_fallback }}"
            echo "::warning::deployment outputs missing; falling back to RG=$RG"
          fi
          if [ -z "$ACR_LOGIN" ]; then
            # Look in this RG first; fall back to the shared dev ACR which
            # the test env borrows when deployAcr=false in its bicepparam.
            ACR_LOGIN=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv | tr -d '\r\n')
            if [ -z "$ACR_LOGIN" ]; then
              ACR_LOGIN=$(az acr list -g aarch-dev-rg --query "[0].loginServer" -o tsv | tr -d '\r\n')
              echo "::warning::no ACR in $RG; falling back to shared ACR=$ACR_LOGIN"
            else
              echo "::warning::deployment outputs missing; falling back to ACR=$ACR_LOGIN"
            fi
          fi
          FRONTEND_APP=$(az containerapp list -g $RG --query "[?contains(name, 'frontend')].name | [0]" -o tsv | tr -d '\r\n')
          BACKEND_APP=$(az containerapp list -g $RG --query "[?contains(name, 'backend')].name | [0]" -o tsv | tr -d '\r\n')
          CUSTOM_DOMAIN=$(az containerapp show -g $RG -n $FRONTEND_APP --query "properties.configuration.ingress.customDomains[0].name" -o tsv 2>/dev/null | tr -d '\r\n')
          if [ -n "$CUSTOM_DOMAIN" ]; then
            FRONTEND_URL="https://${CUSTOM_DOMAIN}"
          else
            FQDN=$(az containerapp show -g $RG -n $FRONTEND_APP --query properties.configuration.ingress.fqdn -o tsv | tr -d '\r\n')
            FRONTEND_URL="https://${FQDN}"
          fi
          echo "acr=${ACR_LOGIN%%.*}" >> $GITHUB_OUTPUT
          echo "rg=$RG" >> $GITHUB_OUTPUT
          echo "backendApp=$BACKEND_APP" >> $GITHUB_OUTPUT
          echo "frontendApp=$FRONTEND_APP" >> $GITHUB_OUTPUT
          echo "frontendUrl=$FRONTEND_URL" >> $GITHUB_OUTPUT

  backend:
    needs: [setenv, detect, infra]
    if: |
      always() &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      (needs.detect.outputs.backend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ${{ github.ref == 'refs/heads/dev' && 'ubuntu-server-2' || 'ubuntu-latest' }}
    environment: ${{ needs.setenv.outputs.gh_env }}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR build
        run: |
          az acr build -r ${{ needs.detect.outputs.acr }} \
            -t aa-backend:${{ env.IMAGE_TAG }} \
            -t aa-backend:latest \
            -f backend/Dockerfile.prod .
      - name: Update container app revision
        run: |
          az containerapp update \
            -g ${{ needs.detect.outputs.rg }} \
            -n ${{ needs.detect.outputs.backendApp }} \
            --image ${{ needs.detect.outputs.acr }}.azurecr.io/aa-backend:${{ env.IMAGE_TAG }} \
            --revision-suffix sha-${IMAGE_TAG:0:6}-r${{ github.run_number }}

  frontend:
    needs: [setenv, detect, infra]
    if: |
      always() &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      (needs.detect.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ${{ github.ref == 'refs/heads/dev' && 'ubuntu-server-2' || 'ubuntu-latest' }}
    environment: ${{ needs.setenv.outputs.gh_env }}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR build
        run: |
          az acr build -r ${{ needs.detect.outputs.acr }} \
            -t aa-frontend:${{ env.IMAGE_TAG }} \
            -t aa-frontend:latest \
            -f frontend/Dockerfile.prod \
            --build-arg VITE_API_BASE_URL="" \
            --build-arg VITE_AUTH_ENABLED=true \
            --build-arg VITE_ENTRA_TENANT_ID=${{ vars.VITE_ENTRA_TENANT_ID }} \
            --build-arg VITE_ENTRA_CLIENT_ID=${{ vars.VITE_ENTRA_CLIENT_ID }} \
            --build-arg VITE_ENTRA_API_SCOPE=${{ vars.VITE_ENTRA_API_SCOPE }} \
            --build-arg VITE_UNIFIED_AGENTS=${{ vars.VITE_UNIFIED_AGENTS }} \
            ./frontend
      - name: Update container app revision
        run: |
          az containerapp update \
            -g ${{ needs.detect.outputs.rg }} \
            -n ${{ needs.detect.outputs.frontendApp }} \
            --image ${{ needs.detect.outputs.acr }}.azurecr.io/aa-frontend:${{ env.IMAGE_TAG }} \
            --revision-suffix sha-${IMAGE_TAG:0:6}-r${{ github.run_number }}

  smoke:
    needs: [detect, backend, frontend]
    if: always() && (needs.backend.result == 'success' || needs.frontend.result == 'success')
    runs-on: ${{ github.ref == 'refs/heads/dev' && 'ubuntu-server-2' || 'ubuntu-latest' }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Frontend health check
        run: |
          URL=${{ needs.detect.outputs.frontendUrl }}
          echo "Smoke testing: $URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null) || code="000"
            echo "Attempt $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          exit 1
