services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      # Mount host Azure CLI tokens so DefaultAzureCredential works inside the
      # container without an API key. Run `az login` on the host first.
      # Docker Desktop expands ~ on Windows, macOS, and Linux.
      - ~/.azure:/root/.azure:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
