services:
  backend:
    build: ./backend
    ports:
      - "8500:8000"
    env_file: .env
    # Auth to Azure OpenAI uses Entra ID via a service principal (app registration).
    # Set AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET in .env — these are
    # picked up by DefaultAzureCredential's EnvironmentCredential. The SP must have
    # the "Cognitive Services OpenAI User" role on your AOAI resource.
    #
    # User → API auth: when AUTH_ENABLED=true in .env, the backend validates Entra
    # JWTs on /api/* (see ENTRA_TENANT_ID, ENTRA_AUDIENCE).
    volumes:
      - ./backend:/app
      # User auth path: `az login` on the host caches tokens in ~/.azure.
      # Mount it read-only so DefaultAzureCredential's AzureCliCredential
      # can pick them up. Required when Conditional Access blocks the SP.
      - ${HOME}/.azure:/root/.azure:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # MSAL popup login for the SPA. Set in .env at the repo root:
    #   VITE_AUTH_ENABLED=true
    #   VITE_ENTRA_TENANT_ID=<tenant-guid>
    #   VITE_ENTRA_CLIENT_ID=<spa-app-registration-client-id>
    #   VITE_ENTRA_API_SCOPE=api://<api-app-registration-client-id>/access_as_user
    # Vite needs these at build time; they're forwarded into the dev server here.
    environment:
      VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-false}
      VITE_ENTRA_TENANT_ID: ${VITE_ENTRA_TENANT_ID:-}
      VITE_ENTRA_CLIENT_ID: ${VITE_ENTRA_CLIENT_ID:-}
      VITE_ENTRA_API_SCOPE: ${VITE_ENTRA_API_SCOPE:-}
      # Inside the compose network the backend is reachable by service name.
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: node node_modules/vite/bin/vite.js --host 0.0.0.0
